version: 0.1

component: build

timeoutInSeconds: 10000

shell: bash

env:
  variables:
    IMAGE_NAME: "agileimage"
    IMAGE_TAG: "0.1"
    OCI_REGION: "mx-queretaro-1"
    OCI_USERNAME: "a01645485@tec.mx"
    OCI_AUTH_TOKEN: 'E)WI0dzlg7GxkgPYx>8G'

steps:
  - type: Command
    name: "Build Maven project"
    timeoutInSeconds: 600
    command: |
      set -e
      cd backend
      chmod +x ./mvnw
      ./mvnw clean package -DskipTests
      echo "JAR built:"
      ls -lh target/*.jar

  - type: Command
    name: "Build and push Docker image"
    command: |
      set -e

      TENANCY_NAMESPACE=$(oci os ns get --query 'data' --raw-output)
      OCIR_PATH="${OCI_REGION}.ocir.io/${TENANCY_NAMESPACE}/${IMAGE_NAME}:${IMAGE_TAG}"
      OCIR_USER="${TENANCY_NAMESPACE}/${OCI_USERNAME}"

      echo "Using image path: ${OCIR_PATH}"
      echo "Logging into OCIR as: ${OCIR_USER}"
      echo "Token length: ${#OCI_AUTH_TOKEN}"

      docker login "${OCI_REGION}.ocir.io" \
        -u "${OCIR_USER}" \
        -p "${OCI_AUTH_TOKEN}"

      cd backend
      docker build -f Dockerfile -t "${OCIR_PATH}" .
      docker push "${OCIR_PATH}"

      echo "Push complete."