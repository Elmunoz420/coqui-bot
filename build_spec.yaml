version: 0.1

component: build

timeoutInSeconds: 10000

shell: bash

env:
  variables:
    IMAGE_NAME: "agileimage"
    IMAGE_TAG: "0.1"
    OCI_REGION: "mx-queretaro-1"

  exportedVariables:
    - OCIR_PATH

steps:
  - type: Command
    name: "Build Maven project"
    timeoutInSeconds: 600
    command: |
      cd backend
      chmod +x ./mvnw
      ./mvnw clean package -DskipTests
      echo "JAR built:"
      ls -lh target/*.jar

  - type: Command
    name: "Set OCIR image path"
    command: |
      TENANCY_NAMESPACE=$(oci os ns get --query 'data' --raw-output)
      OCIR_PATH="${OCI_REGION}.ocir.io/${TENANCY_NAMESPACE}/${IMAGE_NAME}:${IMAGE_TAG}"

      echo "OCIR_PATH=${OCIR_PATH}" | tee -a "$OCI_BUILD_STAGE_ENVIRONMENT_VARIABLES_FILE"
      echo "Image will be pushed to: ${OCIR_PATH}"

  - type: Command
    name: "Build and push Docker image"
    command: |
      set -e

      echo "Using image path: ${OCIR_PATH}"

      cd backend
      docker build -f Dockerfile -t "${OCIR_PATH}" .
      docker push "${OCIR_PATH}"

      echo "Push complete."