spring.jpa.database-platform=org.hibernate.community.dialect.Oracle12cDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

##Properties of UCP
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.type=oracle.ucp.jdbc.PoolDataSource
spring.datasource.oracleucp.connection-factory-class-name=oracle.jdbc.pool.OracleDataSource
spring.datasource.oracleucp.sql-for-validate-connection=select * from dual
spring.datasource.oracleucp.connection-pool-name=connectionPoolName1
spring.datasource.oracleucp.initial-pool-size=15
spring.datasource.oracleucp.min-pool-size=10
spring.datasource.oracleucp.max-pool-size=30

##Logging
logging.level.root=INFO
logging.file.name=logs.log
logging.level.oracle.ucp=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.type=TRACE

deepseek.api.url=https://api.deepseek.com/v1/chat/completions
# Default placeholder — override in application-local.properties or DEEPSEEK_API_KEY env var
deepseek.api.key=${DEEPSEEK_API_KEY:sk-disabled}


# Telegram bot token — read from TELEGRAM_BOT_TOKEN env var (K8s secret).
# In local dev this is overridden by application-local.properties.
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.bot.name=Oracle_420_bot

# DB and bot credentials are intentionally absent here.
# For local development: copy application-local.properties.template to
# application-local.properties and fill in your values.
# application-local.properties is gitignored and never committed.
#
# For Kubernetes: values come from env vars (db_url, db_user, dbpassword,
# driver_class_name) injected by the deployment manifest.
anthropic.api.key=${ANTHROPIC_API_KEY:}
